<!DOCTYPE html>
<!--
  index.html -- Drill frontend.

  C-013: Minimal HTML page with the drill UI (arithmetic loop).
  C-014: Session lifecycle UI (end, restart) + in-memory run log.
  C-015: Keyboard control + empty-answer hint.
  C-017: Import UI (upload a JSONL/CSV bank).
  C-016: Bank selection + drilling non-arithmetic categories.
  C-018a: TTS pronunciation (click-to-hear) for language questions.
  C-018c: Per-answer timing collection (elapsed_ms), collect-only.
  C-019b: Stats view -- durable cross-session stats from GET /api/stats.
  Single self-contained file: vanilla JS, HTML, CSS. No frameworks, no build.
  ASCII only.

  Scope (C-013): the full arithmetic drill loop against the frozen section-6
  API -- category list (gated), an auto-started session reused for the page's
  life, question render, answer grading via POST /api/answer, live session
  stats read from the answer response, and load-next.

  Scope (C-014): the session becomes visible and controllable. End the active
  session (-> resting state) and restart (end + start a fresh run). Sessions
  created during THIS page visit are retained in an in-memory run log and
  rendered newest-first; durable cross-visit history is C-019 (GET /api/stats)
  and is deliberately not touched here -- C-014 reads nothing new from the
  server, it retains and renders the session_stats snapshots it was handed.

  Data-oriented design (C-014): one `sessions` array of plain records is the
  single source of truth. Three isolated transitions mutate it (startSession,
  recordStats, endSession); the stats bar and run log are pure renders derived
  from the array, never hand-patched. One meaning per surface: the stats bar
  always shows the ACTIVE session; the run log shows FINISHED runs.

  Scope (C-015): keyboard rhythm so the drill runs hands-on-keys. A document-
  level keydown handler gated strictly on state.phase: Enter or Space advances
  to the next question while feedback is showing; Escape ends the active
  session from any active phase ("I'm done with this run"). The answer input
  keeps owning Enter-to-submit while answering, so the global handler ignores
  Enter during answering and never double-fires. Also: an inline "enter a
  number" hint under the input when Submit fires on an empty field (was
  previously a silent refocus), cleared as soon as the user types.

  Scope (C-017): import a question bank. A collapsed "Import a bank"
  disclosure reveals a panel with its own import-target category picker (a
  separate control from the top drill selector -- different intent: "where
  does this bank go" vs "what am I drilling"), a JSONL/CSV file chooser, and
  optional bank-name and language fields. Submits as multipart/form-data to
  POST /api/banks/import (this endpoint is multipart, NOT JSON -- so it uses
  FormData + fetch directly, not the JSON apiPost helper). On success shows
  "Imported N questions into '<name>'" and silently refreshes the in-memory
  category->banks data so C-016's selector (next commit) sees the new bank
  without a reload. Parse errors surface the server's row-naming message in
  the panel's own error area. Does NOT drill the imported bank -- that is
  C-016; C-017's payoff is a successful import + count, verifiable because
  GET /api/banks then shows the bank.

  Scope (C-016): bank selection and drilling the non-arithmetic categories.
  The drillability gate (written in C-013, predicate unchanged since) finally
  has its data: /api/categories does NOT carry banks, so the client fetches
  /api/banks once and attaches a `banks` array to each category record. Now
  isDrillable lights up any category with >= 1 bank. (This also fixes the
  C-017 symptom where an imported category stayed gated -- refreshCategories
  now re-fetches banks too, not just categories.) A bank selector appears
  under the category selector for a drillable non-arithmetic category;
  choosing a bank starts a session and drills it. Bank questions carry a real
  question_id (sent back to /api/answer, not null) and use recent= (last 10
  served ids per session) for soft repeat-avoidance; text qtypes also send
  alternatives. multiple_choice renders the server's shuffled `options` as
  clickable choices instead of the text input; the chosen option text is
  submitted. Switching category or bank mid-run ends the current run
  (preserved in the log) and starts a fresh one. Run-log rows now name the
  bank. Folded in: the import panel auto-collapses on success (stays open on
  error).

  Scope (C-018a): TTS pronunciation. A speaker button on the question stage
  lets the user hear the prompt read aloud, for questions where the prompt is
  itself the foreign-language content -- qtype translate or identify -- and
  the bank carries an ISO 639-1 language code. The language is sourced from
  the active drill selection (the chosen bank), NOT from the question payload
  (the payload carries no language field; see the C-018b comment in drill.py
  for the deferred per-question-language path). The browser SpeechSynthesis
  API is the one weird external dependency; it is global, stateful, and async,
  so it is quarantined behind a tiny speech wrapper (speak/cancelSpeech) that
  is the ONLY code here that touches window.speechSynthesis. Speech is
  cancelled on every question transition, session end, and page unload so a
  prior word never talks over a new question. Collect-only siblings (timing)
  and the durable stats view remain later commits.

  Scope (C-018c): per-answer timing collection. The backend already has the
  plumbing -- responses.elapsed_ms exists, insert_response accepts it, the
  /api/answer handler parses it (hardened _optional_int) and stores it -- but
  nothing has been sending it, so every row so far has elapsed_ms NULL. This
  commit closes that gap from the frontend ONLY (no backend change): a
  monotonic performance.now() mark is taken when a question becomes answerable
  (enterAnswering), and at submit the elapsed milliseconds are computed and
  sent as elapsed_ms in the existing /api/answer body.

  Semantics (deliberate, see DECISIONS C-018c): elapsed_ms is THINK+TYPE time
  -- from when the prompt became answerable to submit -- not wall-clock and not
  inclusive of network/grading latency. Because retry-after-error re-enters
  enterAnswering, the mark RESETS on retry, so elapsed_ms measures the
  successful attempt's think-time and excludes a failed round-trip. An empty
  submit does not reset the mark (the user is still thinking). This is
  COLLECT-ONLY: nothing computes or displays timing in v1 -- the data simply
  begins accumulating so a future timing feature has real history to analyze.

  Deliberately NOT in C-018c (later commits own these):
    - stats view (GET /api/stats is still a 501 stub)      -> C-019
    - any timing CALCULATION or display (deferred feature)

  Scope (C-019b): the stats view -- the final commit of the initial plan. A
  collapsed disclosure (mirroring the import disclosure) under the run log; on
  open it fetches GET /api/stats (implemented in C-019a) and renders durable
  cross-session totals (answered / accuracy / correct) plus a per-category
  breakdown, text-only (section 9, no charts in v1). Re-fetched each open (no
  client cache) so it includes answers logged since it was last viewed. This
  is SEPARATE from the live stats bar at the top: the bar is the current
  session (session_stats from /api/answer, in memory); this panel is DB history
  across all sessions -- the two never share state. The panel toggles via the
  hidden attribute and carries the [hidden]{display:none} guard (the documented
  gotcha, folded in). Timing (elapsed_ms) is collected and queryable but not
  shown here -- the timing feature stays deferred.

  As-built contracts honored (verified against drill.py, not just the spec):
    - GET /api/categories -> {categories:[{id,name,description,config}]}
      (NO banks field -- the client must fetch /api/banks separately, C-016)
    - GET /api/banks?category_id=N -> {banks:[{id,category_id,name,language,
      source,metadata,created}]}, ordered by name (C-016)
    - POST /api/session/start {category_id} -> {session_id}
    - GET /api/question?category=arithmetic ->
        {qtype:"arithmetic", question_text, expected,
         question_id:null, alternatives:null, media_url:null}
    - GET /api/question?category=X&bank_id=N&recent=a,b,c -> a bank question:
        {qtype: free_response|multiple_choice|translate|identify,
         question_text, expected, question_id:<real int>, alternatives:[...],
         media_url, and for multiple_choice an extra options:[...] shuffled}
        404 "bank N has no questions" if the bank is empty (C-016)
    - POST /api/answer echoes the served context; question_id passes through
      as JSON null for arithmetic (NULL response row) or the real int for a
      bank question; text qtypes also send alternatives; response carries
      session_stats:{total,correct,accuracy,streak} with accuracy as a
      0.0-1.0 float -- no separate GET /api/stats call.
    - POST /api/session/end {session_id} -> {ended:bool}; harmless no-op on
      an unknown id, so it is safe to fire on beforeunload as dev cleanup.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drill</title>
<style>
  /* ---- Design tokens (C-013) -------------------------------------------
     Slate-ink dark ground; paper-white expression as the stage; one cyan
     correct signal and one clay miss signal. Two faces only: a math-capable
     serif for the expression, a mono for instrumentation (digits sit still
     as they change). */
  :root {
    --ground:      #161a1d;
    --ground-soft: #1d2327;
    --line:        #2b3439;
    --paper:       #f3efe6;
    --muted:       #8c9aa1;
    --muted-dim:   #5c686e;
    --correct:     #5ad1b0;
    --miss:        #e08a76;
    --focus:       #7fb9d4;

    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua",
             Georgia, "Times New Roman", serif;
    --mono:  ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono",
             Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--ground);
    color: var(--paper);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }

  .shell {
    width: 100%;
    max-width: 40rem;
    min-height: 100%;
    padding: 1.5rem 1.25rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ---- Category selector ---------------------------------------------- */
  .selector {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .selector label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .selector select {
    appearance: none;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.6rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .selector select:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  /* ---- Stats bar (always visible) ------------------------------------- */
  .stats {
    display: flex;
    align-items: flex-start;
    gap: 1.75rem;
    padding: 0.9rem 1rem;
    background: var(--ground-soft);
    border: 1px solid var(--line);
    border-radius: 0.5rem;
  }
  .stat { display: flex; flex-direction: column; gap: 0.15rem; }
  .stat .value {
    font-size: 1.35rem;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat .label {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat.streak { margin-left: auto; align-items: flex-end; }

  /* Signature element: the streak pips. A row of marks that fills as a run
     of correct answers chains, and clears on a miss -- the current run made
     glanceable, derived straight from session_stats.streak. */
  .pips {
    display: flex;
    gap: 0.25rem;
    margin-top: 0.35rem;
    min-height: 0.5rem;
  }
  .pip {
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    background: var(--muted-dim);
    transition: background 0.18s ease, transform 0.18s ease;
  }
  .pip.on {
    background: var(--correct);
    transform: scale(1.12);
  }
  .pips .more {
    align-self: center;
    margin-left: 0.15rem;
    font-size: 0.7rem;
    color: var(--correct);
  }

  /* ---- Question stage -------------------------------------------------- */
  /* The stage sizes to its content and must NOT shrink below it: in a flex
     column, a flex item defaults to flex-shrink:1, so when the page is short
     the stage was compressed below its content height and the choices/feedback
     overflowed downward, overlapping the run-log (the bug from the C-016
     screenshots). flex-shrink:0 keeps the stage tall enough to contain
     everything, so later siblings sit below it. Content is top-aligned so a
     tall multiple-choice question never pushes items up over the stats bar
     either. */
  .stage {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 1.25rem;
    text-align: center;
    padding: 2rem 0;
  }
  .expression {
    font-family: var(--serif);
    font-size: clamp(2.75rem, 12vw, 5rem);
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1.05;
    color: var(--paper);
  }
  /* Bank questions are prose, not short arithmetic expressions: smaller, with
     a readable measure so a full sentence does not blow out the stage. */
  .expression.prose {
    font-size: clamp(1.5rem, 5vw, 2.4rem);
    line-height: 1.25;
    max-width: 30rem;
  }

  /* Active-rung indicator (C-2U-c): a quiet badge under the prompt naming
     the difficulty being drilled. Only rendered for a non-default rung. */
  .active-rung {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.5rem;
  }
  .active-rung[hidden] { display: none; }

  /* TTS speaker (C-018a): a quiet, secondary control under the prompt. Muted
     by default, brightening toward the focus cyan on hover/focus -- it should
     read as an aid, not compete with the expression or the answer input. */
  .speaker {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--ground-soft);
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.35rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    cursor: pointer;
  }
  .speaker[hidden] { display: none; }
  .speaker:hover { color: var(--paper); border-color: var(--muted-dim); }
  .speaker:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  /* While a word is being spoken, mark the control so the state is visible. */
  .speaker.speaking { color: var(--focus); border-color: var(--focus); }

  .answer-row {
    display: flex;
    gap: 0.6rem;
    width: 100%;
    max-width: 22rem;
  }
  .answer-row[hidden] { display: none; }
  .answer-row input {
    flex: 1;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.7rem 0.85rem;
    font-family: var(--mono);
    font-size: 1.15rem;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .answer-row input:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  .answer-row input:disabled { opacity: 0.5; }

  /* Inline empty-answer hint (C-015): muted clay, sits directly under the
     input. Reserves no vertical space when empty so the stage does not jump. */
  .answer-hint {
    min-height: 1.1rem;
    font-size: 0.78rem;
    color: var(--miss);
    text-align: center;
  }

  button {
    font-family: var(--mono);
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    border-radius: 0.4rem;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ground);
    padding: 0.7rem 1.1rem;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #fff; }
  button:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  button[hidden] { display: none; }

  /* ---- Feedback area --------------------------------------------------- */
  .feedback {
    min-height: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    font-size: 1rem;
  }
  .feedback .verdict { font-size: 1.1rem; letter-spacing: 0.02em; }
  .feedback.correct .verdict { color: var(--correct); }
  .feedback.miss .verdict { color: var(--miss); }
  .feedback .detail { font-size: 0.85rem; color: var(--muted); }
  .feedback .detail b { color: var(--paper); font-weight: 500; }

  /* ---- Session controls (C-014) --------------------------------------- */
  /* A quiet control row under the stats bar. The active session has an
     "End" and a "Restart" control; the resting state (no active session)
     shows a single "Start new session" control. Secondary styling so the
     loop's primary action (Submit/Next) stays visually dominant. */
  .session-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .session-summary {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    font-size: 0.85rem;
    border: 1px solid var(--muted);
    border-radius: 6px;
    padding: 0.6rem;
  }
  .session-summary .summary-feedback-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .session-summary input[type="text"] {
    flex: 1;
    min-width: 8rem;
  }
  .session-controls .session-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: auto;
  }
  button.secondary {
    background: transparent;
    color: var(--paper);
    border: 1px solid var(--line);
    padding: 0.45rem 0.85rem;
    font-size: 0.8rem;
  }
  button.secondary:hover:not(:disabled) {
    background: var(--ground-soft);
    border-color: var(--muted-dim);
  }

  /* ---- Run log (C-014) -------------------------------------------------
     Finished sessions from this page visit, newest-first. Pure render of
     the `sessions` array. Hidden entirely until there is at least one
     ended, non-empty run to show. */
  .run-log { display: flex; flex-direction: column; gap: 0.5rem; }
  .run-log .run-log-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .run-log ol {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .run-row {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.55rem 0.75rem;
    background: var(--ground-soft);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    font-size: 0.82rem;
  }
  .run-row .run-cat {
    color: var(--paper);
    font-variant-numeric: tabular-nums;
  }
  .run-row .run-figs {
    margin-left: auto;
    display: flex;
    gap: 1rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .run-row .run-figs b { color: var(--paper); font-weight: 500; }

  /* ---- Gate / status notes -------------------------------------------- */
  .note {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
  .note.error { color: var(--miss); }

  /* ---- Import panel (C-017) -------------------------------------------
     A collapsed disclosure that expands an import form. Quiet, secondary --
     an occasional action, not part of the drill stage. */
  .import-disclosure { margin-top: 0.5rem; }
  .import-toggle {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.5rem 0.85rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    width: 100%;
    text-align: left;
  }
  .import-toggle:hover { background: var(--ground-soft); color: var(--paper); }
  .import-toggle:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .import-panel {
    margin-top: 0.6rem;
    padding: 1rem;
    background: var(--ground-soft);
    border: 1px solid var(--line);
    border-radius: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  /* The panel sets display:flex, which overrides the UA [hidden]{display:none}
     default -- so toggling the hidden attribute alone left it visible (the
     "import won't close" bug). Every other toggleable element in this file
     carries this explicit guard; the import panel was the one that missed it. */
  .import-panel[hidden] { display: none; }
  .import-field { display: flex; flex-direction: column; gap: 0.3rem; }
  .import-field label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .import-field select,
  .import-field input[type="text"],
  .import-field input[type="file"] {
    background: var(--ground);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.5rem 0.6rem;
    font-family: var(--mono);
    font-size: 0.85rem;
  }
  .import-field input[type="file"] { cursor: pointer; padding: 0.45rem; }
  .import-field select:focus-visible,
  .import-field input:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  .import-help {
    font-size: 0.72rem;
    color: var(--muted-dim);
    line-height: 1.5;
  }
  .import-help code { color: var(--muted); }
  .import-actions { display: flex; align-items: center; gap: 0.75rem; }
  .import-status { font-size: 0.78rem; }
  .import-status.ok { color: var(--correct); }
  .import-status.error { color: var(--miss); }

  /* ---- Bank selector (C-016) ------------------------------------------
     Appears under the category selector when a non-arithmetic drillable
     category is chosen. Same visual language as the category selector. */
  .bank-selector {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .bank-selector[hidden] { display: none; }
  .bank-selector label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bank-selector select {
    appearance: none;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.6rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .bank-selector select:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  /* ---- Difficulty selector (C-2U-b) -----------------------------------
     Same visual language as the category/bank selectors. Always in the
     layout; disabled (not hidden) for non-arithmetic categories so the
     affordance stays visible. The [hidden] guard is carried explicitly
     because the note sets display:flex-context children -- mirror the
     pattern every other toggleable element in this file uses. */
  .difficulty-selector {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .difficulty-selector label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .difficulty-selector select {
    appearance: none;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.6rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .difficulty-selector select:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  /* Disabled state (non-arithmetic): dim it and drop the pointer cursor so
     it reads as inert rather than broken. */
  .difficulty-selector select:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .difficulty-note {
    font-size: 0.72rem;
    color: var(--muted-dim);
    margin: 0;
  }
  .difficulty-note[hidden] { display: none; }

  /* ---- Multiple-choice options (C-016) --------------------------------
     Rendered in place of the answer input for multiple_choice questions.
     Each option is a full-width choice button; clicking submits that text. */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 100%;
    max-width: 26rem;
  }
  .choices[hidden] { display: none; }
  .choice {
    width: 100%;
    text-align: left;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.7rem 0.9rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .choice:hover:not(:disabled) {
    background: var(--ground);
    border-color: var(--muted-dim);
  }
  .choice:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .choice:disabled { cursor: default; opacity: 0.85; }
  /* After answering, mark the correct choice and a wrong pick. */
  .choice.correct { border-color: var(--correct); color: var(--correct); }
  .choice.wrong { border-color: var(--miss); color: var(--miss); }

  /* ---- Stats view (C-019b) -------------------------------------------
     Disclosure styled to match the import disclosure (same quiet toggle,
     same soft panel). The panel toggles via the hidden attribute, so it
     carries the [hidden]{display:none} guard (the documented
     hidden-vs-explicit-display gotcha). */
  .stats-disclosure { margin-top: 0.5rem; }
  .stats-toggle {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.5rem 0.85rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    width: 100%;
    text-align: left;
  }
  .stats-toggle:hover { background: var(--ground-soft); color: var(--paper); }
  .stats-toggle:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .stats-panel {
    margin-top: 0.6rem;
    padding: 1rem;
    background: var(--ground-soft);
    border: 1px solid var(--line);
    border-radius: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .stats-panel[hidden] { display: none; }
  .stats-panel .stats-note { color: var(--muted); font-size: 0.82rem; }

  /* Overall line: big total + accuracy, echoing the stat bar's hierarchy. */
  .stats-overall {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .stats-overall .stats-figure { display: flex; flex-direction: column; gap: 0.15rem; }
  .stats-overall .stats-figure b { font-size: 1.3rem; color: var(--paper); }
  .stats-overall .stats-figure span {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stats-window { color: var(--muted-dim); font-size: 0.72rem; }

  /* Per-category breakdown: one row per category, name + figures. */
  .stats-breakdown { display: flex; flex-direction: column; gap: 0.4rem; }
  .stats-breakdown-title {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.4rem 0;
    border-top: 1px solid var(--line);
    font-size: 0.85rem;
  }
  .stats-row .stats-cat { color: var(--paper); }
  .stats-row .stats-figs { color: var(--muted); }

  @media (max-width: 30rem) {
    .stats { gap: 1.1rem; }
    .stat .value { font-size: 1.15rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
    .pip.on { transform: none; }
  }
</style>
</head>
<body>
  <main class="shell">
    <!-- Category selector: populated from /api/categories. Non-drillable
         categories are gated (disabled) until they have content. -->
    <div class="selector">
      <label for="category">Category</label>
      <select id="category" aria-label="Category"></select>
    </div>

    <!-- Bank selector (C-016): hidden for arithmetic and when the chosen
         category has no banks; shown with the chosen category's banks
         otherwise. Choosing a bank starts a session and drills it. -->
    <div class="bank-selector" id="bank-selector" hidden>
      <label for="bank">Bank</label>
      <select id="bank" aria-label="Bank"></select>
    </div>

    <!-- Difficulty selector (C-2U-b): arithmetic-only. Populated from
         GET /api/difficulty-rungs; "Default" (value "") is null = the
         pre-#2 unparameterized path. Stays in the layout for every
         category (no jarring reflow): for non-arithmetic categories the
         control is disabled and a note explains why, rather than hidden,
         so the affordance stays visible and comprehensible. Choosing a
         rung sets state.difficulty and re-fetches immediately. -->
    <div class="difficulty-selector" id="difficulty-selector">
      <label for="difficulty">Difficulty</label>
      <select id="difficulty" aria-label="Difficulty"></select>
      <p class="difficulty-note" id="difficulty-note" hidden>
        Difficulty applies to arithmetic.
      </p>
    </div>

    <!-- Stats bar: always visible, fed only by session_stats from the
         /api/answer response. -->
    <div class="stats" aria-live="polite">
      <div class="stat">
        <span class="value" id="stat-total">0</span>
        <span class="label">Answered</span>
      </div>
      <div class="stat">
        <span class="value" id="stat-accuracy">--</span>
        <span class="label">Accuracy</span>
      </div>
      <div class="stat streak">
        <span class="value" id="stat-streak">0</span>
        <span class="label">Streak</span>
        <div class="pips" id="streak-pips" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Session controls (C-014): the active session's lifecycle, made
         visible. Contents are rendered from session state so the resting
         state (no active session) and the active state share one render. -->
    <div class="session-controls" id="session-controls"></div>

    <!-- End-of-session summary (Q4/Q4b, QoL thread): the closing view shown
         after an explicit End -- what happened this run, plus optional
         feedback (rating 1-5 and a note) saved via a second session/end
         POST (the server merges feedback without erasing the first end).
         Hidden while a session is active. -->
    <div class="session-summary" id="session-summary" hidden></div>

    <!-- Question stage: the expression is the hero. -->
    <section class="stage">
      <div class="expression" id="expression" aria-live="polite">--</div>

      <!-- Active-rung indicator (C-2U-c): shows which difficulty is being
           drilled, but only when a non-default rung is active, so the
           default path stays uncluttered. Read-only; derived from the
           served payload's difficulty (no extra fetch). -->
      <div class="active-rung" id="active-rung" aria-live="polite" hidden></div>

      <!-- TTS speaker (C-018a): click to hear the prompt read aloud. Shown
           only for language questions (translate/identify) on a bank that
           carries a language code, and only when SpeechSynthesis exists.
           It is a <button>, so it inherits button[hidden]{display:none};
           a dedicated .speaker[hidden] guard is added alongside for clarity
           (the documented hidden-vs-explicit-display gotcha). -->
      <button id="speaker" class="speaker" type="button"
              aria-label="Hear pronunciation" title="Hear pronunciation"
              hidden>
        <span aria-hidden="true">&#9658;</span> Hear it
      </button>

      <div class="answer-row" id="answer-row">
        <input
          id="answer"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Your answer"
          placeholder="answer"
          disabled>
      </div>

      <!-- Multiple-choice options (C-016): shown in place of the answer row
           for multiple_choice questions. Built from the payload's `options`
           array; clicking a choice submits that option's text. -->
      <div class="choices" id="choices" hidden></div>

      <!-- Progressive hint reveal (Thread N.1): questions may store a `hints`
           list (imported via JSONL/CSV). When the served payload carries one or
           more hints, this area shows a "Reveal hint" control that discloses
           them one at a time. Truthful affordance: with 0 hints the whole area
           stays hidden (no control). Owned by the drill loop -- rebuilt per
           question in renderQuestion, cleared on transition in loadQuestion,
           mirroring the answer-hint lifecycle but on its own node. -->
      <div class="hint-reveal" id="hint-reveal" hidden></div>

      <!-- Action button lives OUTSIDE the answer row so it remains available
           in the feedback phase for multiple_choice (where the answer row is
           hidden). For text qtypes it is the Submit/Next control; for MC it
           is hidden while answering (choices are clicked) and shown as "Next"
           in feedback. -->
      <button id="action" disabled>Submit</button>

      <!-- Inline hint under the input (C-015): shown when Submit fires on an
           empty field; cleared as soon as the user types. Distinct from the
           bottom note, which is for errors. aria-live so it is announced. -->
      <div class="answer-hint" id="answer-hint" aria-live="polite"></div>

      <div class="feedback" id="feedback" aria-live="polite"></div>
    </section>

    <!-- Run log (C-014): finished sessions from this visit, newest-first.
         Rendered from the `sessions` array; hidden when empty. -->
    <div class="run-log" id="run-log" hidden>
      <div class="run-log-title">This session's runs</div>
      <ol id="run-log-list"></ol>
    </div>

    <!-- Status / gate messaging. -->
    <p class="note" id="note"></p>

    <!-- Import panel (C-017): collapsed disclosure. The panel is built/torn
         down by JS on toggle so its category picker always reflects current
         categories. The file input + form fields submit as multipart to
         POST /api/banks/import. -->
    <div class="import-disclosure" id="import-section">
      <button type="button" class="import-toggle" id="import-toggle"
              aria-expanded="false" aria-controls="import-panel">
        + Import a bank
      </button>
      <div class="import-panel" id="import-panel" hidden></div>
    </div>

    <!-- Stats view (C-019b): collapsed disclosure, mirroring the import
         pattern. On open it fetches GET /api/stats and renders durable
         cross-session totals + a per-category breakdown (text only, no charts
         -- section 9). This is SEPARATE from the live stats bar at the top:
         the bar shows the current session (session_stats from /api/answer,
         in-memory); this shows DB history across all sessions. Re-fetched on
         each open so it reflects answers logged since it was last viewed. -->
    <div class="stats-disclosure" id="stats-view">
      <button type="button" class="stats-toggle" id="stats-toggle"
              aria-expanded="false" aria-controls="stats-panel">
        + Stats across sessions
      </button>
      <div class="stats-panel" id="stats-panel" hidden></div>
    </div>
  </main>

<script type="module" src="boot.js"></script>
</body>
</html>
