<!DOCTYPE html>
<!--
  index.html -- Drill frontend.

  C-013: Minimal HTML page with the drill UI (arithmetic loop).
  C-014: Session lifecycle UI (end, restart) + in-memory run log.
  C-015: Keyboard control + empty-answer hint.
  C-017: Import UI (upload a JSONL/CSV bank).
  C-016: Bank selection + drilling non-arithmetic categories.
  Single self-contained file: vanilla JS, HTML, CSS. No frameworks, no build.
  ASCII only.

  Scope (C-013): the full arithmetic drill loop against the frozen section-6
  API -- category list (gated), an auto-started session reused for the page's
  life, question render, answer grading via POST /api/answer, live session
  stats read from the answer response, and load-next.

  Scope (C-014): the session becomes visible and controllable. End the active
  session (-> resting state) and restart (end + start a fresh run). Sessions
  created during THIS page visit are retained in an in-memory run log and
  rendered newest-first; durable cross-visit history is C-019 (GET /api/stats)
  and is deliberately not touched here -- C-014 reads nothing new from the
  server, it retains and renders the session_stats snapshots it was handed.

  Data-oriented design (C-014): one `sessions` array of plain records is the
  single source of truth. Three isolated transitions mutate it (startSession,
  recordStats, endSession); the stats bar and run log are pure renders derived
  from the array, never hand-patched. One meaning per surface: the stats bar
  always shows the ACTIVE session; the run log shows FINISHED runs.

  Scope (C-015): keyboard rhythm so the drill runs hands-on-keys. A document-
  level keydown handler gated strictly on state.phase: Enter or Space advances
  to the next question while feedback is showing; Escape ends the active
  session from any active phase ("I'm done with this run"). The answer input
  keeps owning Enter-to-submit while answering, so the global handler ignores
  Enter during answering and never double-fires. Also: an inline "enter a
  number" hint under the input when Submit fires on an empty field (was
  previously a silent refocus), cleared as soon as the user types.

  Scope (C-017): import a question bank. A collapsed "Import a bank"
  disclosure reveals a panel with its own import-target category picker (a
  separate control from the top drill selector -- different intent: "where
  does this bank go" vs "what am I drilling"), a JSONL/CSV file chooser, and
  optional bank-name and language fields. Submits as multipart/form-data to
  POST /api/banks/import (this endpoint is multipart, NOT JSON -- so it uses
  FormData + fetch directly, not the JSON apiPost helper). On success shows
  "Imported N questions into '<name>'" and silently refreshes the in-memory
  category->banks data so C-016's selector (next commit) sees the new bank
  without a reload. Parse errors surface the server's row-naming message in
  the panel's own error area. Does NOT drill the imported bank -- that is
  C-016; C-017's payoff is a successful import + count, verifiable because
  GET /api/banks then shows the bank.

  Scope (C-016): bank selection and drilling the non-arithmetic categories.
  The drillability gate (written in C-013, predicate unchanged since) finally
  has its data: /api/categories does NOT carry banks, so the client fetches
  /api/banks once and attaches a `banks` array to each category record. Now
  isDrillable lights up any category with >= 1 bank. (This also fixes the
  C-017 symptom where an imported category stayed gated -- refreshCategories
  now re-fetches banks too, not just categories.) A bank selector appears
  under the category selector for a drillable non-arithmetic category;
  choosing a bank starts a session and drills it. Bank questions carry a real
  question_id (sent back to /api/answer, not null) and use recent= (last 10
  served ids per session) for soft repeat-avoidance; text qtypes also send
  alternatives. multiple_choice renders the server's shuffled `options` as
  clickable choices instead of the text input; the chosen option text is
  submitted. Switching category or bank mid-run ends the current run
  (preserved in the log) and starts a fresh one. Run-log rows now name the
  bank. Folded in: the import panel auto-collapses on success (stays open on
  error).

  Deliberately NOT in C-016 (later commits own these):
    - TTS pronunciation                                    -> C-018
    - stats view (GET /api/stats is still a 501 stub)      -> C-019
    - NOTED (no commit yet): a no-feedback "speed drill" mode where submit
      advances immediately and per-answer feedback is withheld until the run
      ends (feedback concentrated at session end). Deferred deliberately: it
      changes the loop's meaning and needs extra state (a pending-results
      buffer), so it is a distinct future commit.

  As-built contracts honored (verified against drill.py, not just the spec):
    - GET /api/categories -> {categories:[{id,name,description,config}]}
      (NO banks field -- the client must fetch /api/banks separately, C-016)
    - GET /api/banks?category_id=N -> {banks:[{id,category_id,name,language,
      source,metadata,created}]}, ordered by name (C-016)
    - POST /api/session/start {category_id} -> {session_id}
    - GET /api/question?category=arithmetic ->
        {qtype:"arithmetic", question_text, expected,
         question_id:null, alternatives:null, media_url:null}
    - GET /api/question?category=X&bank_id=N&recent=a,b,c -> a bank question:
        {qtype: free_response|multiple_choice|translate|identify,
         question_text, expected, question_id:<real int>, alternatives:[...],
         media_url, and for multiple_choice an extra options:[...] shuffled}
        404 "bank N has no questions" if the bank is empty (C-016)
    - POST /api/answer echoes the served context; question_id passes through
      as JSON null for arithmetic (NULL response row) or the real int for a
      bank question; text qtypes also send alternatives; response carries
      session_stats:{total,correct,accuracy,streak} with accuracy as a
      0.0-1.0 float -- no separate GET /api/stats call.
    - POST /api/session/end {session_id} -> {ended:bool}; harmless no-op on
      an unknown id, so it is safe to fire on beforeunload as dev cleanup.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drill</title>
<style>
  /* ---- Design tokens (C-013) -------------------------------------------
     Slate-ink dark ground; paper-white expression as the stage; one cyan
     correct signal and one clay miss signal. Two faces only: a math-capable
     serif for the expression, a mono for instrumentation (digits sit still
     as they change). */
  :root {
    --ground:      #161a1d;
    --ground-soft: #1d2327;
    --line:        #2b3439;
    --paper:       #f3efe6;
    --muted:       #8c9aa1;
    --muted-dim:   #5c686e;
    --correct:     #5ad1b0;
    --miss:        #e08a76;
    --focus:       #7fb9d4;

    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua",
             Georgia, "Times New Roman", serif;
    --mono:  ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono",
             Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--ground);
    color: var(--paper);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }

  .shell {
    width: 100%;
    max-width: 40rem;
    min-height: 100%;
    padding: 1.5rem 1.25rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ---- Category selector ---------------------------------------------- */
  .selector {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .selector label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .selector select {
    appearance: none;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.6rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .selector select:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  /* ---- Stats bar (always visible) ------------------------------------- */
  .stats {
    display: flex;
    align-items: flex-start;
    gap: 1.75rem;
    padding: 0.9rem 1rem;
    background: var(--ground-soft);
    border: 1px solid var(--line);
    border-radius: 0.5rem;
  }
  .stat { display: flex; flex-direction: column; gap: 0.15rem; }
  .stat .value {
    font-size: 1.35rem;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat .label {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat.streak { margin-left: auto; align-items: flex-end; }

  /* Signature element: the streak pips. A row of marks that fills as a run
     of correct answers chains, and clears on a miss -- the current run made
     glanceable, derived straight from session_stats.streak. */
  .pips {
    display: flex;
    gap: 0.25rem;
    margin-top: 0.35rem;
    min-height: 0.5rem;
  }
  .pip {
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    background: var(--muted-dim);
    transition: background 0.18s ease, transform 0.18s ease;
  }
  .pip.on {
    background: var(--correct);
    transform: scale(1.12);
  }
  .pips .more {
    align-self: center;
    margin-left: 0.15rem;
    font-size: 0.7rem;
    color: var(--correct);
  }

  /* ---- Question stage -------------------------------------------------- */
  /* Top-align content rather than vertically centering: a multiple-choice
     question with four options can exceed the stage's min-height, and
     centering overflowing content pushes the top items UP out of the stage,
     overlapping the stats bar (a real bug seen in C-016 testing). Flex-start
     keeps everything flowing downward from the stage top. Short arithmetic
     still looks balanced thanks to the padding. */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 1.5rem;
    text-align: center;
    padding: 2rem 0;
    min-height: 14rem;
  }
  .expression {
    font-family: var(--serif);
    font-size: clamp(2.75rem, 12vw, 5rem);
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1.05;
    color: var(--paper);
  }
  /* Bank questions are prose, not short arithmetic expressions: smaller, with
     a readable measure so a full sentence does not blow out the stage. */
  .expression.prose {
    font-size: clamp(1.5rem, 5vw, 2.4rem);
    line-height: 1.25;
    max-width: 30rem;
  }

  .answer-row {
    display: flex;
    gap: 0.6rem;
    width: 100%;
    max-width: 22rem;
  }
  .answer-row[hidden] { display: none; }
  .answer-row input {
    flex: 1;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.7rem 0.85rem;
    font-family: var(--mono);
    font-size: 1.15rem;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .answer-row input:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  .answer-row input:disabled { opacity: 0.5; }

  /* Inline empty-answer hint (C-015): muted clay, sits directly under the
     input. Reserves no vertical space when empty so the stage does not jump. */
  .answer-hint {
    min-height: 1.1rem;
    font-size: 0.78rem;
    color: var(--miss);
    text-align: center;
  }

  button {
    font-family: var(--mono);
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    border-radius: 0.4rem;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ground);
    padding: 0.7rem 1.1rem;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #fff; }
  button:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  button:disabled { opacity: 0.5; cursor: default; }

  /* ---- Feedback area --------------------------------------------------- */
  .feedback {
    min-height: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    font-size: 1rem;
  }
  .feedback .verdict { font-size: 1.1rem; letter-spacing: 0.02em; }
  .feedback.correct .verdict { color: var(--correct); }
  .feedback.miss .verdict { color: var(--miss); }
  .feedback .detail { font-size: 0.85rem; color: var(--muted); }
  .feedback .detail b { color: var(--paper); font-weight: 500; }

  /* ---- Session controls (C-014) --------------------------------------- */
  /* A quiet control row under the stats bar. The active session has an
     "End" and a "Restart" control; the resting state (no active session)
     shows a single "Start new session" control. Secondary styling so the
     loop's primary action (Submit/Next) stays visually dominant. */
  .session-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .session-controls .session-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: auto;
  }
  button.secondary {
    background: transparent;
    color: var(--paper);
    border: 1px solid var(--line);
    padding: 0.45rem 0.85rem;
    font-size: 0.8rem;
  }
  button.secondary:hover:not(:disabled) {
    background: var(--ground-soft);
    border-color: var(--muted-dim);
  }

  /* ---- Run log (C-014) -------------------------------------------------
     Finished sessions from this page visit, newest-first. Pure render of
     the `sessions` array. Hidden entirely until there is at least one
     ended, non-empty run to show. */
  .run-log { display: flex; flex-direction: column; gap: 0.5rem; }
  .run-log .run-log-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .run-log ol {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .run-row {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.55rem 0.75rem;
    background: var(--ground-soft);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    font-size: 0.82rem;
  }
  .run-row .run-cat {
    color: var(--paper);
    font-variant-numeric: tabular-nums;
  }
  .run-row .run-figs {
    margin-left: auto;
    display: flex;
    gap: 1rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .run-row .run-figs b { color: var(--paper); font-weight: 500; }

  /* ---- Gate / status notes -------------------------------------------- */
  .note {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
  .note.error { color: var(--miss); }

  /* ---- Import panel (C-017) -------------------------------------------
     A collapsed disclosure that expands an import form. Quiet, secondary --
     an occasional action, not part of the drill stage. */
  .import-disclosure { margin-top: 0.5rem; }
  .import-toggle {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.5rem 0.85rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    width: 100%;
    text-align: left;
  }
  .import-toggle:hover { background: var(--ground-soft); color: var(--paper); }
  .import-toggle:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .import-panel {
    margin-top: 0.6rem;
    padding: 1rem;
    background: var(--ground-soft);
    border: 1px solid var(--line);
    border-radius: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .import-field { display: flex; flex-direction: column; gap: 0.3rem; }
  .import-field label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .import-field select,
  .import-field input[type="text"],
  .import-field input[type="file"] {
    background: var(--ground);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.5rem 0.6rem;
    font-family: var(--mono);
    font-size: 0.85rem;
  }
  .import-field input[type="file"] { cursor: pointer; padding: 0.45rem; }
  .import-field select:focus-visible,
  .import-field input:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  .import-help {
    font-size: 0.72rem;
    color: var(--muted-dim);
    line-height: 1.5;
  }
  .import-help code { color: var(--muted); }
  .import-actions { display: flex; align-items: center; gap: 0.75rem; }
  .import-status { font-size: 0.78rem; }
  .import-status.ok { color: var(--correct); }
  .import-status.error { color: var(--miss); }

  /* ---- Bank selector (C-016) ------------------------------------------
     Appears under the category selector when a non-arithmetic drillable
     category is chosen. Same visual language as the category selector. */
  .bank-selector {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .bank-selector[hidden] { display: none; }
  .bank-selector label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bank-selector select {
    appearance: none;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.6rem 0.7rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .bank-selector select:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  /* ---- Multiple-choice options (C-016) --------------------------------
     Rendered in place of the answer input for multiple_choice questions.
     Each option is a full-width choice button; clicking submits that text. */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 100%;
    max-width: 26rem;
  }
  .choices[hidden] { display: none; }
  .choice {
    width: 100%;
    text-align: left;
    background: var(--ground-soft);
    color: var(--paper);
    border: 1px solid var(--line);
    border-radius: 0.4rem;
    padding: 0.7rem 0.9rem;
    font-family: var(--mono);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .choice:hover:not(:disabled) {
    background: var(--ground);
    border-color: var(--muted-dim);
  }
  .choice:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .choice:disabled { cursor: default; opacity: 0.85; }
  /* After answering, mark the correct choice and a wrong pick. */
  .choice.correct { border-color: var(--correct); color: var(--correct); }
  .choice.wrong { border-color: var(--miss); color: var(--miss); }

  /* ---- Later-commit placeholders (kept hidden so C-019 slots in
     without restructuring the page) ------------------------------------- */
  #stats-view { display: none; }

  @media (max-width: 30rem) {
    .stats { gap: 1.1rem; }
    .stat .value { font-size: 1.15rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
    .pip.on { transform: none; }
  }
</style>
</head>
<body>
  <main class="shell">
    <!-- Category selector: populated from /api/categories. Non-drillable
         categories are gated (disabled) until they have content. -->
    <div class="selector">
      <label for="category">Category</label>
      <select id="category" aria-label="Category"></select>
    </div>

    <!-- Bank selector (C-016): hidden for arithmetic and when the chosen
         category has no banks; shown with the chosen category's banks
         otherwise. Choosing a bank starts a session and drills it. -->
    <div class="bank-selector" id="bank-selector" hidden>
      <label for="bank">Bank</label>
      <select id="bank" aria-label="Bank"></select>
    </div>

    <!-- Stats bar: always visible, fed only by session_stats from the
         /api/answer response. -->
    <div class="stats" aria-live="polite">
      <div class="stat">
        <span class="value" id="stat-total">0</span>
        <span class="label">Answered</span>
      </div>
      <div class="stat">
        <span class="value" id="stat-accuracy">--</span>
        <span class="label">Accuracy</span>
      </div>
      <div class="stat streak">
        <span class="value" id="stat-streak">0</span>
        <span class="label">Streak</span>
        <div class="pips" id="streak-pips" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Session controls (C-014): the active session's lifecycle, made
         visible. Contents are rendered from session state so the resting
         state (no active session) and the active state share one render. -->
    <div class="session-controls" id="session-controls"></div>

    <!-- Question stage: the expression is the hero. -->
    <section class="stage">
      <div class="expression" id="expression" aria-live="polite">--</div>

      <div class="answer-row" id="answer-row">
        <input
          id="answer"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Your answer"
          placeholder="answer"
          disabled>
        <button id="action" disabled>Submit</button>
      </div>

      <!-- Multiple-choice options (C-016): shown in place of the answer row
           for multiple_choice questions. Built from the payload's `options`
           array; clicking a choice submits that option's text. -->
      <div class="choices" id="choices" hidden></div>

      <!-- Inline hint under the input (C-015): shown when Submit fires on an
           empty field; cleared as soon as the user types. Distinct from the
           bottom note, which is for errors. aria-live so it is announced. -->
      <div class="answer-hint" id="answer-hint" aria-live="polite"></div>

      <div class="feedback" id="feedback" aria-live="polite"></div>
    </section>

    <!-- Run log (C-014): finished sessions from this visit, newest-first.
         Rendered from the `sessions` array; hidden when empty. -->
    <div class="run-log" id="run-log" hidden>
      <div class="run-log-title">This session's runs</div>
      <ol id="run-log-list"></ol>
    </div>

    <!-- Status / gate messaging. -->
    <p class="note" id="note"></p>

    <!-- Import panel (C-017): collapsed disclosure. The panel is built/torn
         down by JS on toggle so its category picker always reflects current
         categories. The file input + form fields submit as multipart to
         POST /api/banks/import. -->
    <div class="import-disclosure" id="import-section">
      <button type="button" class="import-toggle" id="import-toggle"
              aria-expanded="false" aria-controls="import-panel">
        + Import a bank
      </button>
      <div class="import-panel" id="import-panel" hidden></div>
    </div>

    <div id="stats-view"></div>
  </main>

<script>
"use strict";
/* C-013 -- arithmetic drill loop.
   C-014 -- session lifecycle + in-memory run log.

   State lives in module scope. The drill-loop part is tiny: the question
   payload currently on screen (echoed back to /api/answer) and a phase flag
   that says whether the action button submits or advances.

   Session state (C-014) is data-oriented: a single `sessions` array of plain
   records is the source of truth. Three transitions mutate it (startSession,
   recordStats, endSession); everything visible is a pure render derived from
   it. A session record (C-016 adds bankId/bankName):
     { id:int, categoryId:int, categoryName:str,
       bankId:int|null, bankName:str|null,
       status:"active"|"ended",
       stats:{total,correct,accuracy,streak} }
   activeSessionId points at the one record with status "active" (or null in
   the resting state). The stats bar renders the active record's stats; the
   run log renders ended records that have at least one answer.

   C-016 drill targeting: state.selection holds what the user has chosen to
   drill -- {categoryId, categoryName, bankId|null, bankName|null}. Arithmetic
   has bankId null and auto-starts; a bank category requires a bank choice.
   state.recentIds is the per-active-session list of recently served bank
   question ids (last 10) passed as recent= for soft repeat-avoidance. */

var STREAK_PIPS_MAX = 10; /* visual cap for the signature pip row */
var RECENT_MAX = 10;      /* C-016: per-session recent-id window for recent= */

var state = {
  sessions: [],            /* run log: all sessions created this page visit */
  activeSessionId: null,   /* id of the active record, or null when resting */
  arithmeticCategoryId: null,
  arithmeticCategoryName: "arithmetic",
  categories: [],          /* category records from /api/categories, with a
                              `banks` array attached by fetchAndAttachBanks
                              (C-016) -- /api/categories itself carries none */
  selection: null,         /* C-016: {categoryId, categoryName, bankId,
                              bankName} -- the current drill target */
  recentIds: [],           /* C-016: last-RECENT_MAX served bank question ids
                              for the active session (recent= param) */
  current: null,           /* the question payload now on screen */
  phase: "idle"            /* idle | resting | loading | answering | feedback */
};

var ZERO_STATS = { total: 0, correct: 0, accuracy: 0.0, streak: 0 };

var el = {
  category:  document.getElementById("category"),
  expression: document.getElementById("expression"),
  answer:    document.getElementById("answer"),
  action:    document.getElementById("action"),
  feedback:  document.getElementById("feedback"),
  note:      document.getElementById("note"),
  statTotal: document.getElementById("stat-total"),
  statAccuracy: document.getElementById("stat-accuracy"),
  statStreak: document.getElementById("stat-streak"),
  streakPips: document.getElementById("streak-pips"),
  sessionControls: document.getElementById("session-controls"),
  runLog:    document.getElementById("run-log"),
  runLogList: document.getElementById("run-log-list"),
  answerHint: document.getElementById("answer-hint"),
  importToggle: document.getElementById("import-toggle"),
  importPanel: document.getElementById("import-panel"),
  bankSelector: document.getElementById("bank-selector"),
  bank:      document.getElementById("bank"),
  answerRow: document.getElementById("answer-row"),
  choices:   document.getElementById("choices")
};

/* ---- API helpers ------------------------------------------------------ */

/* Read a JSON response, surfacing the backend's {error} envelope as a thrown
   Error so callers can show it in the interface's own voice. */
async function readJson(response) {
  var data;
  try {
    data = await response.json();
  } catch (parseError) {
    throw new Error("The server sent a response that could not be read.");
  }
  if (!response.ok) {
    var message = (data && data.error) ? data.error
                                       : "Request failed (" + response.status + ").";
    throw new Error(message);
  }
  return data;
}

async function apiGet(path) {
  var response = await fetch(path, { headers: { "Accept": "application/json" } });
  return readJson(response);
}

async function apiPost(path, body) {
  var response = await fetch(path, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(body)
  });
  return readJson(response);
}

/* ---- Drillability gate ------------------------------------------------
   A category is drillable if it is arithmetic OR it has at least one bank.
   The predicate has been unchanged since C-013; C-016 finally feeds it real
   data by attaching `banks` to each category (fetchAndAttachBanks below),
   since /api/categories itself carries no banks. */
function isDrillable(category) {
  return category.name === "arithmetic" ||
         (Array.isArray(category.banks) && category.banks.length > 0);
}

/* C-016: fetch all banks once and attach a `banks` array to each category in
   state.categories, grouped by category_id. This is what makes the gate work
   and what feeds the bank selector. /api/categories does not include banks,
   so this separate fetch is required. Safe to call repeatedly (after import,
   refreshCategories calls it again). On failure, categories keep whatever
   banks they had (or none) -- non-fatal. */
async function fetchAndAttachBanks() {
  var data = await apiGet("/api/banks");
  var byCategory = {};
  (data.banks || []).forEach(function (bank) {
    var key = String(bank.category_id);
    if (!byCategory[key]) {
      byCategory[key] = [];
    }
    byCategory[key].push(bank);
  });
  state.categories.forEach(function (category) {
    category.banks = byCategory[String(category.id)] || [];
  });
}

/* ---- Stats bar -------------------------------------------------------- */

/* Render the stats bar from a session_stats object as returned by
   /api/answer: {total, correct, accuracy (0.0-1.0 float), streak}. */
function renderStats(stats) {
  el.statTotal.textContent = String(stats.total);
  el.statAccuracy.textContent = stats.total > 0
    ? Math.round(stats.accuracy * 100) + "%"
    : "--";
  el.statStreak.textContent = String(stats.streak);
  renderStreakPips(stats.streak);
}

function renderStreakPips(streak) {
  el.streakPips.textContent = "";
  var shown = Math.min(streak, STREAK_PIPS_MAX);
  for (var i = 0; i < STREAK_PIPS_MAX; i++) {
    var pip = document.createElement("span");
    pip.className = "pip" + (i < shown ? " on" : "");
    el.streakPips.appendChild(pip);
  }
  if (streak > STREAK_PIPS_MAX) {
    var more = document.createElement("span");
    more.className = "more";
    more.textContent = "+" + (streak - STREAK_PIPS_MAX);
    el.streakPips.appendChild(more);
  }
}

/* ---- Notes / errors --------------------------------------------------- */

function setNote(text, isError) {
  el.note.textContent = text || "";
  el.note.classList.toggle("error", !!isError);
}

/* The inline hint under the input (C-015), distinct from the bottom note. */
function setAnswerHint(text) {
  el.answerHint.textContent = text || "";
}
function clearAnswerHint() {
  el.answerHint.textContent = "";
}

/* ---- Session state: transitions (the only mutators of state.sessions) --

   These three functions are the single place session records change. Callers
   never touch state.sessions or the DOM for sessions directly; they call a
   transition and then renderSessionUI(), which derives every visible surface
   from the array. */

/* Find the active record (status "active"), or null in the resting state. */
function activeSession() {
  for (var i = 0; i < state.sessions.length; i++) {
    if (state.sessions[i].id === state.activeSessionId) {
      return state.sessions[i];
    }
  }
  return null;
}

/* Start a session on the server for the current selection and append a fresh
   active record carrying its category and (for bank categories) its bank.
   Sends bank_id to /api/session/start when a bank is selected. Resets the
   per-session recent-id window. Returns the new id.

   The selection defaults to arithmetic when nothing else is chosen (e.g. on
   boot), preserving C-013's arithmetic auto-start. */
async function startSession() {
  var sel = state.selection || {
    categoryId: state.arithmeticCategoryId,
    categoryName: state.arithmeticCategoryName,
    bankId: null,
    bankName: null
  };
  var body = { category_id: sel.categoryId };
  if (sel.bankId !== null && sel.bankId !== undefined) {
    body.bank_id = sel.bankId;
  }
  var result = await apiPost("/api/session/start", body);
  state.sessions.push({
    id: result.session_id,
    categoryId: sel.categoryId,
    categoryName: sel.categoryName,
    bankId: sel.bankId !== undefined ? sel.bankId : null,
    bankName: sel.bankName !== undefined ? sel.bankName : null,
    status: "active",
    stats: ZERO_STATS
  });
  state.activeSessionId = result.session_id;
  state.recentIds = []; /* fresh repeat-avoidance window per session */
  return result.session_id;
}

/* Fold a session_stats snapshot (from /api/answer) into the active record.
   Pure assignment into the one record; no DOM here. */
function recordStats(sessionId, stats) {
  for (var i = 0; i < state.sessions.length; i++) {
    if (state.sessions[i].id === sessionId) {
      state.sessions[i].stats = {
        total: stats.total,
        correct: stats.correct,
        accuracy: stats.accuracy,
        streak: stats.streak
      };
      return;
    }
  }
}

/* End a session on the server and mark its record "ended". If it is the
   active one, the resting state begins (activeSessionId -> null). Ending an
   unknown/already-ended id is a harmless server no-op, so this is safe to
   call without first checking server state. */
async function endSession(sessionId) {
  if (sessionId === null) {
    return;
  }
  try {
    await apiPost("/api/session/end", { session_id: sessionId });
  } catch (error) {
    /* A failed end should not strand the UI: still mark it ended locally and
       surface the message. The server treats unknown ids as no-ops anyway. */
    setNote(error.message, true);
  }
  for (var i = 0; i < state.sessions.length; i++) {
    if (state.sessions[i].id === sessionId) {
      state.sessions[i].status = "ended";
      break;
    }
  }
  if (state.activeSessionId === sessionId) {
    state.activeSessionId = null;
  }
}

/* ---- Session UI: derived renders (never hand-patched) ----------------- */

/* Draw every session-derived surface from the array in one place: the stats
   bar (active session, or zeros when resting) and the run log (ended,
   non-empty runs, newest-first). */
function renderSessionUI() {
  var active = activeSession();
  renderStats(active ? active.stats : ZERO_STATS);
  /* The streak pips are meaningful only for an in-progress run; hide the row
     in the resting state so the bar reads as "nothing in progress". */
  el.streakPips.style.visibility = active ? "visible" : "hidden";
  renderSessionControls(active);
  renderRunLog();
}

/* The control row. Active: a "Restart" and an "End" control. Resting: a
   single "Start new session" control. Rendered from state, so the two states
   share one code path. */
function renderSessionControls(active) {
  el.sessionControls.textContent = "";

  var label = document.createElement("span");
  label.className = "session-label";
  if (active) {
    label.textContent = "Session " + active.id;
    el.sessionControls.appendChild(label);

    var restart = document.createElement("button");
    restart.type = "button";
    restart.className = "secondary";
    restart.id = "restart-session";
    restart.textContent = "Restart";
    restart.addEventListener("click", onRestartSession);
    el.sessionControls.appendChild(restart);

    var end = document.createElement("button");
    end.type = "button";
    end.className = "secondary";
    end.id = "end-session";
    end.textContent = "End session";
    end.addEventListener("click", onEndSession);
    el.sessionControls.appendChild(end);
  } else {
    label.textContent = "No active session";
    el.sessionControls.appendChild(label);

    var start = document.createElement("button");
    start.type = "button";
    start.className = "secondary";
    start.id = "start-session";
    start.textContent = "Start new session";
    start.addEventListener("click", onStartSession);
    el.sessionControls.appendChild(start);
  }
}

/* The run log: ended sessions with at least one answer, newest-first. A
   started-but-never-answered session (total 0) is not a run and is omitted.
   Pure projection of state.sessions; rebuilt wholesale each call. */
function renderRunLog() {
  var runs = state.sessions.filter(function (s) {
    return s.status === "ended" && s.stats.total > 0;
  });
  runs.reverse(); /* array is append order (oldest-first); show newest-first */

  el.runLogList.textContent = "";
  if (runs.length === 0) {
    el.runLog.hidden = true;
    return;
  }
  el.runLog.hidden = false;

  runs.forEach(function (run) {
    var li = document.createElement("li");
    li.className = "run-row";

    var cat = document.createElement("span");
    cat.className = "run-cat";
    /* Runs are category (+ bank, for bank categories). Name both so the log
       distinguishes a vocabulary/spanish run from vocabulary/french. */
    var runLabel = run.categoryName;
    if (run.bankName) {
      runLabel += " / " + run.bankName;
    }
    cat.textContent = runLabel + " #" + run.id;
    li.appendChild(cat);

    var figs = document.createElement("span");
    figs.className = "run-figs";
    figs.appendChild(figure(run.stats.total, "answered"));
    figs.appendChild(figure(Math.round(run.stats.accuracy * 100) + "%", "accuracy"));
    figs.appendChild(figure(run.stats.streak, "final streak"));
    li.appendChild(figs);

    el.runLogList.appendChild(li);
  });
}

/* A small run-row figure: an emphasized value followed by a muted label
   (e.g. "<b>12</b> answered"). The value is the data; the label names it. */
function figure(value, label) {
  var span = document.createElement("span");
  var head = document.createElement("b");
  head.textContent = String(value);
  span.appendChild(head);
  span.appendChild(document.createTextNode(" " + label));
  return span;
}

/* Dev cleanup, not session UI: end the active session on page close/refresh
   so the DB does not fill with dangling never-ended sessions during
   development. Unknown-id end is a harmless no-op server-side. Uses
   sendBeacon so the request survives unload. */
function endSessionOnUnload() {
  if (state.activeSessionId === null) {
    return;
  }
  var payload = JSON.stringify({ session_id: state.activeSessionId });
  if (navigator.sendBeacon) {
    navigator.sendBeacon(
      "/api/session/end",
      new Blob([payload], { type: "application/json" })
    );
  } else {
    /* Best-effort fallback for browsers without sendBeacon. */
    fetch("/api/session/end", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: payload,
      keepalive: true
    });
  }
}

/* ---- Drill loop ------------------------------------------------------- */

async function loadQuestion() {
  state.phase = "loading";
  state.current = null;
  el.action.disabled = true;
  el.answer.disabled = true;
  el.answer.value = "";
  clearChoices();
  clearFeedback();
  el.expression.textContent = "...";

  try {
    /* Auto-start a session if none is active. For arithmetic this is the
       C-013 auto-start; for a bank category the session was already started
       by the bank selection (onBankChange), so this branch is the arithmetic
       fallback / resting-restart path. */
    if (state.activeSessionId === null) {
      await startSession();
      renderSessionUI();
    }
    var payload = await apiGet(questionQuery());
    state.current = payload;
    /* Track served bank question ids for soft repeat-avoidance (recent=).
       Arithmetic ids are null and are not tracked. */
    if (payload.question_id !== null && payload.question_id !== undefined) {
      pushRecent(payload.question_id);
    }
    renderQuestion(payload);
    enterAnswering();
  } catch (error) {
    el.expression.textContent = "--";
    setNote(error.message, true);
    state.phase = "idle";
  }
}

/* Build the GET /api/question URL for the active selection. Arithmetic uses
   just category; a bank category adds bank_id and the recent= window. */
function questionQuery() {
  var sel = state.selection || { categoryName: state.arithmeticCategoryName,
                                  bankId: null };
  if (sel.bankId === null || sel.bankId === undefined) {
    return "/api/question?category=arithmetic";
  }
  var params = "category=" + encodeURIComponent(sel.categoryName)
             + "&bank_id=" + encodeURIComponent(sel.bankId);
  if (state.recentIds.length > 0) {
    params += "&recent=" + state.recentIds.join(",");
  }
  return "/api/question?" + params;
}

/* Keep the last RECENT_MAX served bank ids. */
function pushRecent(id) {
  state.recentIds.push(id);
  if (state.recentIds.length > RECENT_MAX) {
    state.recentIds = state.recentIds.slice(-RECENT_MAX);
  }
}

/* Render a question payload onto the stage. Text qtypes (arithmetic and
   free_response/translate/identify) use the text input; multiple_choice
   swaps in the choices list. Long bank prose gets the smaller .prose size. */
function renderQuestion(payload) {
  el.expression.textContent = payload.question_text;
  var isArithmetic = payload.qtype === "arithmetic";
  el.expression.classList.toggle("prose", !isArithmetic);

  if (payload.qtype === "multiple_choice") {
    el.answerRow.hidden = true;
    renderChoices(payload.options || []);
    el.choices.hidden = false;
  } else {
    el.choices.hidden = true;
    clearChoices();
    el.answerRow.hidden = false;
    /* Numeric keypad for arithmetic; normal text for word answers. */
    el.answer.setAttribute("inputmode", isArithmetic ? "numeric" : "text");
    el.answer.setAttribute("placeholder", isArithmetic ? "answer" : "your answer");
  }
}

/* Build the multiple-choice buttons. Each submits its own option text. */
function renderChoices(options) {
  el.choices.textContent = "";
  options.forEach(function (optionText) {
    var button = document.createElement("button");
    button.type = "button";
    button.className = "choice";
    button.textContent = optionText;
    button.addEventListener("click", function () {
      submitChoice(optionText);
    });
    el.choices.appendChild(button);
  });
}

function clearChoices() {
  el.choices.textContent = "";
  el.choices.hidden = true;
}

function enterAnswering() {
  state.phase = "answering";
  clearAnswerHint();
  if (state.current && state.current.qtype === "multiple_choice") {
    /* Choice buttons are the input; the action button and text field stay
       out of the way. Focus the first choice for keyboard users. */
    el.action.disabled = true;
    setChoicesDisabled(false);
    var first = el.choices.querySelector(".choice");
    if (first) {
      first.focus();
    }
  } else {
    el.answer.disabled = false;
    el.action.disabled = false;
    el.action.textContent = "Submit";
    el.answer.focus();
  }
}

function setChoicesDisabled(disabled) {
  var buttons = el.choices.querySelectorAll(".choice");
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].disabled = disabled;
  }
}

async function submitAnswer() {
  if (state.phase !== "answering" || state.current === null) {
    return;
  }
  var userInput = el.answer.value.trim();
  if (userInput === "") {
    /* C-015: tell the user why nothing happened, instead of a silent refocus.
       The hint clears as soon as they type (see onAnswerInput). */
    setAnswerHint(emptyHintText());
    el.answer.focus();
    return;
  }
  clearAnswerHint();
  el.answer.disabled = true;
  await gradeAndShow(userInput);
}

/* Multiple-choice: the clicked option's text is the answer. Disables the
   choices, then grades through the same path as a typed answer. */
async function submitChoice(optionText) {
  if (state.phase !== "answering" || state.current === null) {
    return;
  }
  setChoicesDisabled(true);
  await gradeAndShow(optionText);
}

/* Shared grading path for both typed answers and chosen options. Posts to
   /api/answer with the served context: the real question_id for bank
   questions (null for arithmetic), the qtype, and alternatives for text
   qtypes. Arithmetic sends no tolerance (exact compare) and no alternatives. */
async function gradeAndShow(userInput) {
  state.phase = "loading";
  el.action.disabled = true;

  var q = state.current;
  var sessionId = state.activeSessionId;
  var body = {
    session_id: sessionId,
    qtype: q.qtype,
    question_text: q.question_text,
    expected: q.expected,
    user_input: userInput,
    /* Arithmetic: question_id is null -> NULL response row. Bank questions:
       the real stored id passes through as an int -> proper FK. */
    question_id: q.question_id
  };
  /* Text qtypes accept also-correct answers; forward them so the server can
     match. multiple_choice ignores alternatives (exact match); arithmetic
     has none. */
  if (q.alternatives && q.alternatives.length > 0) {
    body.alternatives = q.alternatives;
  }
  try {
    var result = await apiPost("/api/answer", body);
    /* Single source of truth: fold the snapshot into the session record and
       let the derived render redraw the stats bar (and any run log). */
    recordStats(sessionId, result.session_stats);
    renderSessionUI();
    showFeedback(result);
    if (q.qtype === "multiple_choice") {
      markChoices(result);
    }
    enterFeedback();
  } catch (error) {
    setNote(error.message, true);
    /* Let the user retry the same question rather than losing it. */
    enterAnswering();
  }
}

/* The empty-submit hint text depends on the question type: arithmetic wants
   a number, word answers want text. */
function emptyHintText() {
  if (state.current && state.current.qtype === "arithmetic") {
    return "Enter a number to submit.";
  }
  return "Enter an answer to submit.";
}

/* After grading a multiple_choice question, mark the correct option and, on a
   miss, the wrong pick, so the feedback is visible on the choices too. */
function markChoices(result) {
  var buttons = el.choices.querySelectorAll(".choice");
  for (var i = 0; i < buttons.length; i++) {
    var text = buttons[i].textContent;
    if (text === result.expected) {
      buttons[i].classList.add("correct");
    } else if (!result.correct && text === result.user_input) {
      buttons[i].classList.add("wrong");
    }
  }
}

function showFeedback(result) {
  setNote("");
  el.feedback.classList.remove("correct", "miss");
  el.feedback.classList.add(result.correct ? "correct" : "miss");

  var verdict = document.createElement("div");
  verdict.className = "verdict";
  verdict.textContent = result.correct ? "Correct" : "Not quite";
  el.feedback.appendChild(clearAnd(verdict));

  if (!result.correct) {
    var detail = document.createElement("div");
    detail.className = "detail";
    var label = document.createTextNode("Answer: ");
    var value = document.createElement("b");
    value.textContent = result.expected;
    detail.appendChild(label);
    detail.appendChild(value);
    el.feedback.appendChild(detail);
  }
}

/* Replace feedback contents with the first node in one step (keeps the
   aria-live region from announcing stale text). */
function clearAnd(firstNode) {
  el.feedback.textContent = "";
  return firstNode;
}

function clearFeedback() {
  el.feedback.textContent = "";
  el.feedback.classList.remove("correct", "miss");
}

function enterFeedback() {
  state.phase = "feedback";
  el.action.disabled = false;
  el.action.textContent = "Next";
  el.action.focus();
}

/* The single action button drives the loop: submit while answering, advance
   while showing feedback. (Richer keyboard control is C-015.) */
function onAction() {
  if (state.phase === "answering") {
    submitAnswer();
  } else if (state.phase === "feedback") {
    loadQuestion();
  }
}

/* Enter submits an answer from the input while answering. The answer input
   owns Enter in this phase; the document-level handler deliberately ignores
   Enter while answering so the two never both fire. */
function onAnswerKey(event) {
  if (event.key === "Enter" && state.phase === "answering") {
    event.preventDefault();
    submitAnswer();
  }
}

/* Typing anything clears a pending empty-answer hint. */
function onAnswerInput() {
  if (el.answerHint.textContent) {
    clearAnswerHint();
  }
}

/* ---- Keyboard control (C-015) ----------------------------------------

   A single document-level keydown handler, gated strictly on state.phase so
   it can never collide with the input's Enter-to-submit or double-fire with a
   focused button:

     - Escape: end the active session from ANY active phase ("I'm done").
     - Enter / Space: advance to the next question, but ONLY in the feedback
       phase. In the answering phase Enter belongs to the input and Space is
       a literal keystroke (modal: keys mean different things by phase).

   Guards: ignore key events originating from the category <select> (so its
   own keyboard navigation works), and when the advance key's target is the
   action button itself, let the button's native activation drive onAction
   rather than advancing twice. */
function onDocumentKey(event) {
  var key = event.key;
  var target = event.target;

  /* Do not hijack keys typed into form controls (the category selector, and
     the import panel's text inputs / file picker / select). Escape there
     should not end the session; Space/Enter there are normal keystrokes.
     The answer input is excluded from this guard: it has its own Enter-to-
     submit handler and the phase gate below covers the rest. */
  if (target !== el.answer && isFormControl(target)) {
    return;
  }

  if (key === "Escape") {
    /* End from any phase where a session is active. Discards an unsubmitted
       answer by design -- Escape means done. */
    if (state.activeSessionId !== null) {
      event.preventDefault();
      onEndSession();
    }
    return;
  }

  if (state.phase === "feedback" && (key === "Enter" || key === " ")) {
    /* If a button is focused (the action button or a session control), its
       native Enter/Space activation already does the right thing; let it.
       Do NOT preventDefault on a focused button -- on a button, preventDefault
       on Space would suppress the native click and swallow the action. (No
       page scroll happens while a button is focused.) This prevents a
       focused "End"/"Restart" from both activating AND advancing. */
    if (target.tagName === "BUTTON") {
      return;
    }
    event.preventDefault();
    loadQuestion();
  }
}

/* True for interactive form controls where keystrokes must not be hijacked
   by the global keyboard handler. */
function isFormControl(node) {
  if (!node || !node.tagName) {
    return false;
  }
  var tag = node.tagName;
  return tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA"
      || tag === "BUTTON";
}

/* ---- Session lifecycle controls (C-014) ------------------------------- */

/* Put the stage in the resting state: no question, controls offer "Start
   new session". The just-ended run (if any) is already in the log via the
   endSession transition. One meaning per surface -- the stats bar resets to
   zeros here because it always reflects the ACTIVE session, and there is
   none. */
function enterResting() {
  state.phase = "resting";
  state.current = null;
  el.expression.textContent = "--";
  el.expression.classList.remove("prose");
  el.answer.value = "";
  el.answer.disabled = true;
  el.answerRow.hidden = false;
  el.action.disabled = true;
  el.action.textContent = "Submit";
  clearChoices();
  clearAnswerHint();
  clearFeedback();
}

/* End the active session explicitly and rest. The ended run joins the log
   (if it has at least one answer). */
async function onEndSession() {
  if (state.activeSessionId === null) {
    return;
  }
  setNote("");
  await endSession(state.activeSessionId);
  enterResting();
  renderSessionUI();
}

/* Restart = end the current run (preserved in the log) + start a fresh one,
   then drill. Confirmed behavior: the just-ended run stays visible; the new
   run begins with zeroed stats. */
async function onRestartSession() {
  setNote("");
  await endSession(state.activeSessionId);
  renderSessionUI(); /* show the ended run in the log + resting bar briefly */
  await loadQuestion(); /* auto-starts a fresh session and serves a question */
}

/* Start a new session from the resting state and drill. */
async function onStartSession() {
  setNote("");
  await loadQuestion(); /* loadQuestion auto-starts when none is active */
}

/* ---- Category + bank wiring (C-016) ----------------------------------- */

function populateCategories(categories) {
  state.categories = categories;
  el.category.textContent = "";
  categories.forEach(function (category) {
    var drillable = isDrillable(category);
    var option = document.createElement("option");
    option.value = String(category.id);
    option.dataset.name = category.name;
    option.textContent = drillable
      ? category.name
      : category.name + " (no banks yet)";
    option.disabled = !drillable;
    el.category.appendChild(option);
    if (category.name === "arithmetic") {
      state.arithmeticCategoryId = category.id;
    }
  });
}

/* Find a category record by id (string or number). */
function findCategory(id) {
  for (var i = 0; i < state.categories.length; i++) {
    if (String(state.categories[i].id) === String(id)) {
      return state.categories[i];
    }
  }
  return null;
}

/* Selecting a category: arithmetic hides the bank selector and drills
   immediately (its run auto-starts, as before). A bank category reveals the
   bank selector populated with that category's banks and waits for a bank
   choice -- selecting the category alone does not start a run. */
function onCategoryChange() {
  var category = findCategory(el.category.value);
  if (!category) {
    return;
  }
  if (category.name === "arithmetic") {
    el.bankSelector.hidden = true;
    switchSelection({
      categoryId: category.id,
      categoryName: category.name,
      bankId: null,
      bankName: null
    });
    return;
  }
  /* Bank category: show its banks and let the user pick one. */
  showBankSelector(category);
}

/* Populate and reveal the bank selector for a category. Auto-selects the
   first bank and starts drilling it (so choosing a category gets you into a
   run without a second click), matching how arithmetic starts on selection. */
function showBankSelector(category) {
  var banks = category.banks || [];
  el.bank.textContent = "";
  banks.forEach(function (bank) {
    var option = document.createElement("option");
    option.value = String(bank.id);
    option.dataset.name = bank.name;
    option.textContent = bank.name;
    el.bank.appendChild(option);
  });
  el.bankSelector.hidden = banks.length === 0;
  if (banks.length === 0) {
    return;
  }
  /* Drill the first bank by default. */
  el.bank.selectedIndex = 0;
  switchSelection({
    categoryId: category.id,
    categoryName: category.name,
    bankId: banks[0].id,
    bankName: banks[0].name
  });
}

/* Selecting a bank from the bank selector: switch the run to that bank. */
function onBankChange() {
  var category = findCategory(el.category.value);
  if (!category) {
    return;
  }
  var option = el.bank.options[el.bank.selectedIndex];
  if (!option) {
    return;
  }
  switchSelection({
    categoryId: category.id,
    categoryName: category.name,
    bankId: parseInt(option.value, 10),
    bankName: option.dataset.name
  });
}

/* Set the drill target and (re)start a run for it. If a run is active, end
   it first (preserved in the run log, per C-014) -- switching category or
   bank is a deliberate "new run" action, like Restart. Then drill. */
async function switchSelection(selection) {
  setNote("");
  state.selection = selection;
  if (state.activeSessionId !== null) {
    await endSession(state.activeSessionId);
    renderSessionUI();
  }
  await loadQuestion(); /* auto-starts a fresh session for the new selection */
}

/* ---- Import (C-017) ---------------------------------------------------

   POST /api/banks/import is a MULTIPART endpoint (file part + form fields),
   not JSON, so it bypasses the apiPost helper and posts a FormData. The
   panel is rebuilt each time it opens so its category picker reflects the
   current category list. On success we re-fetch categories so the
   drillability gate updates (the bridge to C-016, which will read the new
   bank); C-017 itself does not drill the imported bank. */

/* Toggle the disclosure. Builds the panel lazily on first open. */
function onImportToggle() {
  var open = el.importToggle.getAttribute("aria-expanded") === "true";
  if (open) {
    el.importPanel.hidden = true;
    el.importToggle.setAttribute("aria-expanded", "false");
    el.importToggle.textContent = "+ Import a bank";
  } else {
    buildImportPanel();
    el.importPanel.hidden = false;
    el.importToggle.setAttribute("aria-expanded", "true");
    el.importToggle.textContent = "- Import a bank";
  }
}

/* (Re)build the import form. Pure DOM construction from state.categories;
   no network. A separate category picker from the top drill selector --
   different intent ("where does this bank go"), and every category is a
   valid import target, including ones with no banks yet. */
function buildImportPanel() {
  el.importPanel.textContent = "";

  /* Import-target category picker. */
  var catField = importField("Import into category");
  var catSelect = document.createElement("select");
  catSelect.id = "import-category";
  state.categories.forEach(function (category) {
    var option = document.createElement("option");
    option.value = String(category.id);
    option.textContent = category.name;
    catSelect.appendChild(option);
  });
  catField.appendChild(catSelect);
  el.importPanel.appendChild(catField);

  /* File chooser (JSONL or CSV). */
  var fileField = importField("File (.jsonl or .csv)");
  var fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.id = "import-file";
  fileInput.accept = ".jsonl,.csv,.json,.txt";
  fileField.appendChild(fileInput);
  el.importPanel.appendChild(fileField);

  /* Optional bank name. */
  var nameField = importField("Bank name (optional)");
  var nameInput = document.createElement("input");
  nameInput.type = "text";
  nameInput.id = "import-name";
  nameInput.placeholder = "defaults to the file name";
  nameInput.autocomplete = "off";
  nameField.appendChild(nameInput);
  el.importPanel.appendChild(nameField);

  /* Optional language code. */
  var langField = importField("Language code (optional)");
  var langInput = document.createElement("input");
  langInput.type = "text";
  langInput.id = "import-language";
  langInput.placeholder = "e.g. en, es, fr";
  langInput.autocomplete = "off";
  langField.appendChild(langInput);
  el.importPanel.appendChild(langField);

  /* Format help. */
  var help = document.createElement("p");
  help.className = "import-help";
  help.appendChild(document.createTextNode(
    "Each record needs question and answer. Optional: qtype "
    + "(free_response, multiple_choice, translate, identify; default "
    + "free_response), alternatives, distractors, hints, tags, media_url, "
    + "difficulty (1-5). JSONL: one JSON object per line. CSV: a header row; "
    + "array cells are pipe-separated."));
  el.importPanel.appendChild(help);

  /* Action row + status. */
  var actions = document.createElement("div");
  actions.className = "import-actions";
  var submit = document.createElement("button");
  submit.type = "button";
  submit.id = "import-submit";
  submit.textContent = "Import";
  submit.addEventListener("click", onImportSubmit);
  actions.appendChild(submit);
  var status = document.createElement("span");
  status.className = "import-status";
  status.id = "import-status";
  actions.appendChild(status);
  el.importPanel.appendChild(actions);
}

function importField(labelText) {
  var field = document.createElement("div");
  field.className = "import-field";
  var label = document.createElement("label");
  label.textContent = labelText;
  field.appendChild(label);
  return field;
}

function setImportStatus(text, kind) {
  var status = document.getElementById("import-status");
  if (!status) {
    return;
  }
  status.textContent = text || "";
  status.className = "import-status" + (kind ? " " + kind : "");
}

/* Submit the import as multipart/form-data. Validates a file is chosen,
   builds FormData, posts, and reports the {bank_id, imported} count or the
   server's row-naming parse error. */
async function onImportSubmit() {
  var fileInput = document.getElementById("import-file");
  var catSelect = document.getElementById("import-category");
  var nameInput = document.getElementById("import-name");
  var langInput = document.getElementById("import-language");
  var submit = document.getElementById("import-submit");

  if (!fileInput || fileInput.files.length === 0) {
    setImportStatus("Choose a file to import.", "error");
    return;
  }

  var form = new FormData();
  form.append("file", fileInput.files[0]);
  form.append("category_id", catSelect.value);
  if (nameInput.value.trim() !== "") {
    form.append("name", nameInput.value.trim());
  }
  if (langInput.value.trim() !== "") {
    form.append("language", langInput.value.trim());
  }
  /* format is omitted: the server infers it from the file extension. */

  submit.disabled = true;
  setImportStatus("Importing...", null);
  try {
    var response = await fetch("/api/banks/import", {
      method: "POST",
      body: form /* no Content-Type header: the browser sets the multipart
                    boundary automatically */
    });
    var data = await readJson(response); /* throws on !ok with {error} */
    var bankLabel = (nameInput.value.trim() !== "")
      ? nameInput.value.trim()
      : (fileInput.files[0].name || "bank");
    setImportStatus(
      "Imported " + data.imported + " question"
      + (data.imported === 1 ? "" : "s") + " into '" + bankLabel + "'.",
      "ok");
    /* Refresh categories AND banks so the drillability gate updates now that
       a bank exists: the category un-gates and its new bank is selectable.
       This is the C-016 fix for the C-017 symptom (category stayed gated). */
    await refreshCategories();
    /* C-016 fold-in: collapse the panel on success so the user is returned to
       the drill. Kept open on error (the catch below) so they can fix and
       retry. A brief delay lets the success message be seen first. */
    setTimeout(collapseImportPanel, 1200);
  } catch (error) {
    setImportStatus(error.message, "error");
  } finally {
    submit.disabled = false;
  }
}

/* Collapse the import disclosure (used after a successful import). */
function collapseImportPanel() {
  if (el.importToggle.getAttribute("aria-expanded") === "true") {
    el.importPanel.hidden = true;
    el.importToggle.setAttribute("aria-expanded", "false");
    el.importToggle.textContent = "+ Import a bank";
  }
}

/* Re-fetch categories and re-render the top selector (keeping the current
   selection if still present). Used after an import so a newly-drillable
   category un-gates without a page reload. */
async function refreshCategories() {
  try {
    var data = await apiGet("/api/categories");
    var previous = el.category.value;
    populateCategories(data.categories);
    /* CRITICAL (C-016 fix): re-attach banks after re-populating, since
       /api/categories carries none. Without this the just-imported category
       would re-render still gated -- this was the C-017 gray-dropdown bug. */
    await fetchAndAttachBanks();
    populateCategories(state.categories); /* re-render now that banks exist */
    /* Restore prior selection when it still exists and is enabled. */
    var optionToRestore = null;
    for (var i = 0; i < el.category.options.length; i++) {
      if (el.category.options[i].value === previous
          && !el.category.options[i].disabled) {
        optionToRestore = el.category.options[i];
        break;
      }
    }
    if (optionToRestore) {
      el.category.value = previous;
    }
  } catch (error) {
    /* A failed refresh is non-fatal: the import already succeeded. Leave the
       selector as-is; the user can reload to see the new category state. */
  }
}

/* ---- Boot ------------------------------------------------------------- */

async function boot() {
  el.action.addEventListener("click", onAction);
  el.answer.addEventListener("keydown", onAnswerKey);
  el.answer.addEventListener("input", onAnswerInput);
  el.category.addEventListener("change", onCategoryChange);
  el.bank.addEventListener("change", onBankChange);
  el.importToggle.addEventListener("click", onImportToggle);
  document.addEventListener("keydown", onDocumentKey);
  window.addEventListener("beforeunload", endSessionOnUnload);

  try {
    var data = await apiGet("/api/categories");
    populateCategories(data.categories);
    /* Attach banks (separate fetch -- /api/categories has none), then
       re-render so any category with banks is already un-gated on load. A
       banks-fetch failure is non-fatal: arithmetic still drills. */
    try {
      await fetchAndAttachBanks();
      populateCategories(state.categories);
    } catch (banksError) {
      /* Leave categories bank-less; only arithmetic will be drillable. */
    }

    if (state.arithmeticCategoryId === null) {
      setNote("No arithmetic category found. Check the seeded categories.", true);
      return;
    }
    /* Default selection is arithmetic (first seeded category); start drilling.
       Set the selection explicitly so startSession targets arithmetic. */
    el.category.value = String(state.arithmeticCategoryId);
    el.bankSelector.hidden = true;
    state.selection = {
      categoryId: state.arithmeticCategoryId,
      categoryName: state.arithmeticCategoryName,
      bankId: null,
      bankName: null
    };
    renderSessionUI(); /* show controls/zeroed bar before the first answer */
    await loadQuestion();
  } catch (error) {
    setNote(error.message, true);
  }
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
</script>
</body>
</html>
